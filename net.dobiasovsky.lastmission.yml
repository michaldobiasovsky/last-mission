app-id: net.dobiasovsky.lastmission
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25
command: last-mission
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk25/install.sh

  - name: last-mission
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/openjdk25/bin
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk25
    build-commands:
      - mkdir -p build/classes /app/bin /app/share/lastmission /app/share/applications /app/share/metainfo /app/share/icons/hicolor/512x512/apps
      - find src/main/java -name '*.java' > sources.list
      - COMPILE_JARS="$(find . -maxdepth 1 -type f -name '*.jar' -printf '%p:' | sed 's/:$//')" && javac --release 25 -encoding UTF-8 --module-path "$COMPILE_JARS" --processor-path ./lombok-1.18.42.jar -d build/classes @sources.list
      - cp -r src/main/resources/. build/classes/
      - jar --create --file /app/share/lastmission/lastmission.jar --main-class net.dobiasovsky.lastmission.App -C build/classes .
      - for jar in ./*.jar; do install -Dm644 "$jar" "/app/share/lastmission/$(basename "$jar")"; done
      - mkdir -p /app/bin /app/share/lastmission /app/share/applications /app/share/metainfo /app/share/icons/hicolor/512x512/apps
      - install -Dm644 flatpak/net.dobiasovsky.lastmission.desktop /app/share/applications/net.dobiasovsky.lastmission.desktop
      - install -Dm644 flatpak/net.dobiasovsky.lastmission.metainfo.xml /app/share/metainfo/net.dobiasovsky.lastmission.metainfo.xml
      - install -Dm644 flatpak/net.dobiasovsky.lastmission.png /app/share/icons/hicolor/512x512/apps/net.dobiasovsky.lastmission.png
      - printf '%s\n' '#!/bin/sh' 'exec java --module-path /app/share/lastmission --add-modules ALL-MODULE-PATH --enable-native-access=javafx.graphics,javafx.media -m net.dobiasovsky.lastmission/net.dobiasovsky.lastmission.App "$@"' > /app/bin/last-mission
      - chmod +x /app/bin/last-mission
