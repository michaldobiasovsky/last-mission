name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Stažení repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Javy 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: 'maven'

      - name: Kompilace přes Maven
        run: mvn clean package -DskipTests

      - name: Vytvoření GitHub Release a nahrání JAR souboru
        uses: softprops/action-gh-release@v2
        with:
          files: target/lastmission-*.jar
          generate_release_notes: true